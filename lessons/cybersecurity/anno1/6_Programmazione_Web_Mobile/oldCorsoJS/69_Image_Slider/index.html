<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider per Principessa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1> Ciao Principessa, sfoglia le macchine e pensa a quale potrebbe piacerti...</h1>

    <div class="slider">
        <div class="slides">
            <img class="slide" src="imgs/delorean.jpg" alt="delorean">
            <img class="slide" src="imgs/ferrarif40.jpg" alt="ferrari">
            <img class="slide" src="imgs/porsche918.jpg" alt="porsche">
        </div>
        <button class="prev" onclick="prevSlide()">&#10094;</button>
        <button class="next" onclick="nextSlide()">&#10095;</button>
    </div>

    <script src="index.js"></script>
</body>
</html>
