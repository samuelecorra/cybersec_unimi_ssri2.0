<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronometro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div id="mainContainer">
        
        <div id="containerPrincipessa">
            <h1>Benvenuta Principessa al tuo personalissimo CRONOMETRO DIGITALE!</h1>
        </div>

        <div id="containerCronometro">
            <div id="displayCronometro">00:00:00:00</div>
            <div id="controlliCronometro">
                <button id="startButton" onclick="startCronometro()">Start</button>
                <button id="stopButton" onclick="stopCronometro()">Stop</button>
                <button id="resetButton" onclick="resetCronometro()">Reset</button>
            </div>
        </div>

    </div>

    <script src="index.js"></script>
</body>
</html>
