<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinkalkulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Benvenuta Principessa, eccoti la tua calcolatrice rosa caramellosa!</h1>

    <div id="calcolatrice">
        <div id="displayContainer">
                <input id="display">
        </div>
        <div id="tasti">
            <!-- Iniziamo con una calcolatrice minimal... + - * / -->
            <button class="operatorBTN" onclick="appendToDisplay('+')">+</button>
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operatorBTN" onclick="appendToDisplay('-')">-</button>
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operatorBTN" onclick="appendToDisplay('*')">x</button>
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button class="operatorBTN" onclick="appendToDisplay('/')">/</button>
            <button onclick="appendToDisplay('0')">0</button>
            <button onclick="appendToDisplay('.')">.</button>

            <button onclick="calcola()">=</button>
            <button onclick="AllClear()">AC</button>

        </div>

    <script src="index.js"></script>
</body>
</html>
