<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro a Javascript
    </title>
    <!-- Come già sappiamo, bisogna includere il foglio di stile-->
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <!-- La primissima accortezza da prendere quando si vuole iniziare a rendere
    il proprio sito interattivo con qualche riga di javascript è assicurarsi di 
    includere sempre, per buona prassi alla fine, nel body la riga contenente il 
    tag script che linka il nostro documento con estensione .js, poiché in questa
    maniera anche se ci fossero errori di scripting, la pagina
    potrebbe comunque renderizzare tutta prima di segnalare effettivamente errore -->

    <h1 id="greeting">Bienvenue al corso di Javascript!</h1>
    <p id="description">Lorem ipsum dolor sit amet consectetur adipisicing elit. Quaerat, ipsam, ea dicta molestias repellendus, eaque sunt asperiores ullam ipsum facilis consequatur nostrum id expedita architecto repellat? Vero magnam placeat optio!</p>
    <script src="index.js"></script>

    <!-- Dopo aver definito i due campi h1 e p, che sono PIENI, il nostro obiettivo diventa popolarli
     non scrivendoci direttamente tra ><, bensì mediante scripting dal nostro altro file...
     Procediamo nella lezione 2! -->
</body>
</html>
